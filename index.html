<script>
(function(){
"use strict";

const MAX_N = 32;       // max symmetry (roots)
const MAX_LAYERS = 6;
const BASE_DIM = 700;   // on-screen render resolution
let DIM = BASE_DIM;     // current render resolution (raised during export)

const view = { xMin:-2, xMax:2, yMin:-2, yMax:2 };

// ---- Palette: obangsaek (오방색) + intermediate hues, as [r,g,b] floats ----
function hx(hex){ return [parseInt(hex.slice(1,3),16)/255, parseInt(hex.slice(3,5),16)/255, parseInt(hex.slice(5,7),16)/255]; }
const PALETTE = [
  { name:'청 green',   fill:'#2f6b4f', light:'#74b393' },
  { name:'적 red',     fill:'#9c2b22', light:'#d4726e' },
  { name:'황 yellow',  fill:'#e3a212', light:'#f5d273' },
  { name:'군청 blue',  fill:'#27357c', light:'#7a80c4' },
  { name:'주홍 verm.', fill:'#c4471f', light:'#e88a5c' },
  { name:'양록 jade',  fill:'#188a5e', light:'#62c79c' },
  { name:'백 white',   fill:'#f2efe6', light:'#ffffff' },
  { name:'흑 ink',     fill:'#1c1a17', light:'#52504b' },
].map(p=>({ name:p.name, fill:p.fill, light:p.light, intV:hx(p.fill), ltV:hx(p.light) }));

const GROUNDS = [
  { name:'white', hex:'#ffffff' },
  { name:'ink',   hex:'#14110d' },
  { name:'green', hex:'#15342a' },
  { name:'red',   hex:'#3a0f0c' },
  { name:'indigo',hex:'#121634' },
];

// blend modes: 0 normal, 1 multiply, 2 screen
const BLEND_NAMES = ['over','multiply','screen'];
// outline: 0 none, 1 white, 2 ink
const OUTLINE_NAMES = ['none','white','ink'];
// shape motifs (0-3 repeated around a ring, 4-7 centered)
const SHAPE_NAMES = ['circle (bead)','petal','leaf','diamond','ring','star','polygon','flower'];

// ---- Mutable state ----
function defaultLayers(){
  return [
    {n:12, maxIter:120, radius:1.00, rot:0,    colorIdx:0, opacity:1.0, blend:0, bands:0, outline:1, shape:1, size:0.42},
    {n:24, maxIter:100, radius:1.02, rot:0.13, colorIdx:1, opacity:1.0, blend:0, bands:0, outline:1, shape:0, size:0.14},
    {n:6,  maxIter:80,  radius:0.80, rot:0.26, colorIdx:3, opacity:1.0, blend:0, bands:0, outline:1, shape:3, size:0.40},
    {n:8,  maxIter:90,  radius:1.00, rot:0.10, colorIdx:2, opacity:1.0, blend:0, bands:5, outline:1, shape:7, size:0.30},
    {n:5,  maxIter:60,  radius:0.70, rot:0,    colorIdx:5, opacity:1.0, blend:0, bands:0, outline:1, shape:5, size:0.45},
    {n:3,  maxIter:50,  radius:0.30, rot:0,    colorIdx:4, opacity:1.0, blend:0, bands:0, outline:1, shape:4, size:0.10},
  ];
}
let layers = defaultLayers();
let numLayers = 4;
let mode = 'shapes';
let bgIdx = 1;

// ===================== WebGL =====================
const vsBasic = 'attribute vec2 a_pos; void main(){ gl_Position=vec4(a_pos,0.,1.); }';
const vsUV    = 'attribute vec2 a_pos; varying vec2 v_uv; void main(){ v_uv=(a_pos+1.)/2.; gl_Position=vec4(a_pos,0.,1.); }';

const fsEscape = `
precision highp float;
uniform vec2 u_res;
uniform float u_xMin,u_xMax,u_yMin,u_yMax;
uniform int u_maxIter;
uniform float u_n, u_rot, u_bands, u_outline;
uniform vec2 u_roots[${MAX_N}];
uniform vec3 u_int, u_lt;
vec2 mulC(vec2 a,vec2 b){ return vec2(a.x*b.x-a.y*b.y, a.x*b.y+a.y*b.x); }
vec2 rot2(vec2 p,float a){ float s=sin(a),c=cos(a); return vec2(c*p.x-s*p.y, s*p.x+c*p.y); }
int iterate(vec2 q){
  int j=0; int n=int(u_n);
  for(int i=0;i<500;i++){
    if(i>=u_maxIter) break;
    if(dot(q,q)>=4.) break;
    vec2 prod=vec2(1.,0.);
    for(int k=0;k<${MAX_N};k++){ if(k>=n) break; prod=mulC(prod,q-u_roots[k]); }
    q=mulC(q,prod); j++;
  }
  return j;
}
void main(){
  vec2 uv=gl_FragCoord.xy/u_res;
  float cx=u_xMin+uv.x*(u_xMax-u_xMin);
  float cy=u_yMin+uv.y*(u_yMax-u_yMin);
  float px=(u_xMax-u_xMin)/u_res.x;
  float py=(u_yMax-u_yMin)/u_res.y;
  vec2 P =rot2(vec2(cx,cy),u_rot);
  int j=iterate(P);
  bool isI=(j>=u_maxIter);
  if(u_outline>0.5){
    bool nb=(iterate(rot2(vec2(cx,cy+py),u_rot))>=u_maxIter)
          ||(iterate(rot2(vec2(cx,cy-py),u_rot))>=u_maxIter)
          ||(iterate(rot2(vec2(cx+px,cy),u_rot))>=u_maxIter)
          ||(iterate(rot2(vec2(cx-px,cy),u_rot))>=u_maxIter);
    if(isI!=nb){ vec3 oc=(u_outline<1.5)?vec3(1.):vec3(0.06); gl_FragColor=vec4(oc,1.); return; }
  }
  if(isI){ gl_FragColor=vec4(u_int,1.); return; }
  float v=clamp(1.-2./max(float(j),1.),0.,1.);
  if(u_bands>0.5){ v=floor(v*u_bands+0.001)/u_bands; }
  gl_FragColor=vec4(mix(u_lt,u_int,v), v);
}`;

const fsNewton = `
precision highp float;
uniform vec2 u_res;
uniform float u_xMin,u_xMax,u_yMin,u_yMax;
uniform int u_maxIter;
uniform float u_n, u_rot, u_outline;
uniform vec2 u_roots[${MAX_N}];
uniform vec3 u_int, u_lt;
vec2 rot2(vec2 p,float a){ float s=sin(a),c=cos(a); return vec2(c*p.x-s*p.y, s*p.x+c*p.y); }
vec2 invC(vec2 d){ return vec2(d.x,-d.y)/max(dot(d,d),1e-12); }
// returns vec2(rootIndex or -1, iterations)
vec2 newton(vec2 z){
  int n=int(u_n); float conv=-1.; float it=0.;
  for(int i=0;i<500;i++){
    if(i>=u_maxIter) break;
    vec2 s=vec2(0.);
    for(int k=0;k<${MAX_N};k++){ if(k>=n) break; s+=invC(z-u_roots[k]); }
    if(dot(s,s)<1e-12) break;
    z-=invC(s); it+=1.;
    for(int k=0;k<${MAX_N};k++){ if(k>=n) break; if(distance(z,u_roots[k])<2e-3){ conv=float(k); break; } }
    if(conv>=0.) break;
  }
  return vec2(conv,it);
}
void main(){
  vec2 uv=gl_FragCoord.xy/u_res;
  float cx=u_xMin+uv.x*(u_xMax-u_xMin);
  float cy=u_yMin+uv.y*(u_yMax-u_yMin);
  float px=(u_xMax-u_xMin)/u_res.x;
  float py=(u_yMax-u_yMin)/u_res.y;
  vec2 r=newton(rot2(vec2(cx,cy),u_rot));
  float conv=r.x, it=r.y;
  if(u_outline>0.5){
    float a=newton(rot2(vec2(cx,cy+py),u_rot)).x;
    float b=newton(rot2(vec2(cx,cy-py),u_rot)).x;
    float c=newton(rot2(vec2(cx+px,cy),u_rot)).x;
    float d=newton(rot2(vec2(cx-px,cy),u_rot)).x;
    if(a!=conv||b!=conv||c!=conv||d!=conv){ vec3 oc=(u_outline<1.5)?vec3(1.):vec3(0.06); gl_FragColor=vec4(oc,1.); return; }
  }
  if(conv<0.){ gl_FragColor=vec4(0.); return; }
  float petal=mod(conv,2.0);
  float shade=0.6+0.4*(1.0-clamp(it/float(u_maxIter),0.,1.));
  vec3 col=mix(u_int,u_lt,petal*0.65)*shade;
  float alpha=smoothstep(0.04,0.45,clamp(it/8.0,0.,1.));
  gl_FragColor=vec4(col,alpha);
}`;

const fsShape = `
precision highp float;
uniform vec2 u_res;
uniform float u_xMin,u_xMax,u_yMin,u_yMax;
uniform float u_n, u_rot, u_radius, u_size, u_bands, u_outline;
uniform int u_shape;
uniform vec3 u_int, u_lt;
const float PI=3.1415926;
const float TAU=6.2831853;
float ndot(vec2 a,vec2 b){ return a.x*b.x-a.y*b.y; }
float sdVesica(vec2 p,float r,float d){
  p=abs(p);
  float b=sqrt(max(r*r-d*d,0.0));
  return ((p.y-b)*d>p.x*b) ? length(p-vec2(0.0,b)) : length(p-vec2(-d,0.0))-r;
}
float sdRhombus(vec2 p,vec2 b){
  p=abs(p);
  float h=clamp(ndot(b-2.0*p,b)/dot(b,b),-1.0,1.0);
  float d=length(p-0.5*b*vec2(1.0-h,1.0+h));
  return d*sign(p.x*b.y+p.y*b.x-b.x*b.y);
}
float sdStar(vec2 p,float r,float n,float m){
  float an=PI/n, en=PI/m;
  vec2 acs=vec2(cos(an),sin(an));
  vec2 ecs=vec2(cos(en),sin(en));
  float bn=mod(atan(p.x,p.y),2.0*an)-an;
  p=length(p)*vec2(cos(bn),abs(sin(bn)));
  p-=r*acs;
  p+=ecs*clamp(-dot(p,ecs),0.0,r*acs.y/ecs.y);
  return length(p)*sign(p.x);
}
float sdPoly(vec2 p,float r,float n){
  float an=TAU/n;
  float bn=mod(atan(p.x,p.y),an)-0.5*an;
  vec2 q=length(p)*vec2(cos(bn),abs(sin(bn)));
  float he=r*tan(0.5*an);
  q.x-=r; q.y-=clamp(q.y,-he,he);
  return length(q)*sign(q.x);
}
void main(){
  vec2 uv=gl_FragCoord.xy/u_res;
  vec2 P=vec2(u_xMin+uv.x*(u_xMax-u_xMin), u_yMin+uv.y*(u_yMax-u_yMin));
  float pw=(u_xMax-u_xMin)/u_res.x;
  float cs=cos(u_rot), sn=sin(u_rot);
  P=vec2(cs*P.x-sn*P.y, sn*P.x+cs*P.y);
  float d; float unit;
  if(u_shape<=3){
    float n=max(u_n,1.0);
    float cell=TAU/n;
    float a=mod(atan(P.y,P.x),cell)-0.5*cell;
    float rad=length(P);
    vec2 local=(vec2(rad*sin(a),rad*cos(a))-vec2(0.0,u_radius))/u_size;
    if(u_shape==0)      d=length(local)-1.0;
    else if(u_shape==1) d=sdVesica(local,1.6,1.25);
    else if(u_shape==2) d=sdVesica(local*vec2(0.75,1.0),1.3,0.75);
    else                d=sdRhombus(local,vec2(0.8,1.2));
    d*=u_size; unit=u_size;
  } else {
    float n=max(u_n,2.0);
    if(u_shape==4){ d=abs(length(P)-u_radius)-u_size*0.5; }
    else if(u_shape==5){ float m=clamp(2.0+u_size*(n-2.0),2.0,n); d=sdStar(P,u_radius,n,m); }
    else if(u_shape==6){ d=sdPoly(P,u_radius,max(u_n,3.0))-u_size*0.12; }
    else { float amp=u_size*0.7; d=length(P)-(u_radius+amp*cos(n*atan(P.y,P.x))); }
    unit=max(u_radius,0.2);
  }
  float lw=pw*1.6;
  vec3 line=(u_outline<0.5)?u_lt:((u_outline<1.5)?vec3(1.0):vec3(0.06));
  if(u_outline>0.5 && abs(d)<lw){ gl_FragColor=vec4(line,1.0); return; }
  if(d<0.0){
    if(u_bands>0.5){
      float bw=unit/(u_bands+1.0);
      if(mod(-d,bw)<lw){ gl_FragColor=vec4(line,1.0); return; }
    }
    float depth=clamp(-d/(unit*0.9),0.0,1.0);
    gl_FragColor=vec4(mix(u_lt,u_int,depth),1.0); return;
  }
  gl_FragColor=vec4(0.0);
}`;

function compile(gl,type,src){
  const s=gl.createShader(type); gl.shaderSource(s,src); gl.compileShader(s);
  if(!gl.getShaderParameter(s,gl.COMPILE_STATUS)){ console.error('shader:',gl.getShaderInfoLog(s),src); return null; }
  return s;
}
function program(gl,vs,fs){
  const p=gl.createProgram();
  const v=compile(gl,gl.VERTEX_SHADER,vs), f=compile(gl,gl.FRAGMENT_SHADER,fs);
  if(!v||!f) return null;
  gl.attachShader(p,v); gl.attachShader(p,f); gl.linkProgram(p);
  if(!gl.getProgramParameter(p,gl.LINK_STATUS)){ console.error('link:',gl.getProgramInfoLog(p)); return null; }
  return p;
}
function getGL(canvas, attrs){
  return canvas.getContext('webgl',attrs) || canvas.getContext('experimental-webgl',attrs);
}

let webglOK = true;
const offscreens = [];

function buildVariant(gl, fsSrc){
  const prog=program(gl,vsBasic,fsSrc);
  if(!prog) return null;
  const ap=gl.getAttribLocation(prog,'a_pos');
  const names=['u_res','u_xMin','u_xMax','u_yMin','u_yMax','u_maxIter','u_n','u_rot','u_bands','u_outline','u_roots','u_int','u_lt','u_radius','u_size','u_shape'];
  const u={}; names.forEach(n=>u[n]=gl.getUniformLocation(prog,n));
  return {prog,ap,u};
}

function makeOffscreen(){
  const cv=document.createElement('canvas'); cv.width=DIM; cv.height=DIM;
  const gl=getGL(cv,{alpha:true,premultipliedAlpha:false,preserveDrawingBuffer:false});
  if(!gl){ webglOK=false; return null; }
  const buf=gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER,buf);
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1, 1,-1, -1,1, 1,1]),gl.STATIC_DRAW);
  const escape=buildVariant(gl,fsEscape);
  const newton=buildVariant(gl,fsNewton);
  const shape=buildVariant(gl,fsShape);
  if(!escape||!newton||!shape){ webglOK=false; return null; }
  return {gl,cv,buf,escape,newton,shape};
}

let comp=null;
function makeComp(canvas){
  canvas.width=DIM; canvas.height=DIM;
  const gl=getGL(canvas,{alpha:false,preserveDrawingBuffer:true});
  if(!gl){ webglOK=false; return null; }
  const compFS=`
precision highp float;
varying vec2 v_uv;
uniform sampler2D u_tex[${MAX_LAYERS}];
uniform float u_scales[${MAX_LAYERS}];
uniform float u_opacity[${MAX_LAYERS}];
uniform int u_blend[${MAX_LAYERS}];
uniform int u_numLayers;
uniform vec3 u_bg;
vec4 sampleLayer(int idx, vec2 t){
  if(idx==0) return texture2D(u_tex[0],t);
  else if(idx==1) return texture2D(u_tex[1],t);
  else if(idx==2) return texture2D(u_tex[2],t);
  else if(idx==3) return texture2D(u_tex[3],t);
  else if(idx==4) return texture2D(u_tex[4],t);
  return texture2D(u_tex[5],t);
}
void main(){
  vec3 col=u_bg;
  for(int i=0;i<${MAX_LAYERS};i++){
    if(i>=u_numLayers) break;
    float sc=u_scales[i];
    vec2 t=(v_uv-0.5)/sc+0.5;
    if(t.x<0.||t.x>1.||t.y<0.||t.y>1.) continue;
    vec4 c=sampleLayer(i,t);
    float a=c.a*u_opacity[i];
    if(a<=0.001) continue;
    vec3 src=c.rgb;
    vec3 blended=src;
    if(u_blend[i]==1) blended=src*col;
    else if(u_blend[i]==2) blended=1.0-(1.0-src)*(1.0-col);
    col=mix(col,blended,a);
  }
  gl_FragColor=vec4(col,1.);
}`;
  const prog=program(gl,vsUV,compFS);
  if(!prog){ webglOK=false; return null; }
  gl.useProgram(prog);
  const buf=gl.createBuffer();
  gl.bindBuffer(gl.ARRAY_BUFFER,buf);
  gl.bufferData(gl.ARRAY_BUFFER,new Float32Array([-1,-1, 1,-1, -1,1, 1,1]),gl.STATIC_DRAW);
  const ap=gl.getAttribLocation(prog,'a_pos');
  gl.enableVertexAttribArray(ap); gl.vertexAttribPointer(ap,2,gl.FLOAT,false,0,0);
  const textures=[];
  for(let i=0;i<MAX_LAYERS;i++){
    const t=gl.createTexture();
    gl.bindTexture(gl.TEXTURE_2D,t);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_S,gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_WRAP_T,gl.CLAMP_TO_EDGE);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MIN_FILTER,gl.LINEAR);
    gl.texParameteri(gl.TEXTURE_2D,gl.TEXTURE_MAG_FILTER,gl.LINEAR);
    textures.push(t);
  }
  const u={
    numLayers:gl.getUniformLocation(prog,'u_numLayers'),
    scales:gl.getUniformLocation(prog,'u_scales'),
    opacity:gl.getUniformLocation(prog,'u_opacity'),
    blend:gl.getUniformLocation(prog,'u_blend'),
    bg:gl.getUniformLocation(prog,'u_bg'),
    tex:Array.from({length:MAX_LAYERS},(_,i)=>gl.getUniformLocation(prog,`u_tex[${i}]`)),
  };
  return {gl,prog,buf,ap,u,textures};
}

// ---- geometry helpers ----
function getScale(i,total){ return total<=1 ? 1.0 : 1.0-(i/(total-1))*0.6; }
function buildRoots(n,r){
  const arr=new Float32Array(MAX_N*2);
  for(let k=0;k<n;k++){ arr[k*2]=r*Math.cos(2*Math.PI*k/n); arr[k*2+1]=r*Math.sin(2*Math.PI*k/n); }
  return arr;
}

function renderOffscreen(i){
  const o=offscreens[i]; const l=layers[i]; const gl=o.gl;
  const sel = mode==='newton' ? o.newton : mode==='shapes' ? o.shape : o.escape;
  const sc=getScale(i,numLayers);
  const cx=(view.xMin+view.xMax)/2, cy=(view.yMin+view.yMax)/2;
  const hw=(view.xMax-view.xMin)/2/sc, hh=(view.yMax-view.yMin)/2/sc;
  gl.useProgram(sel.prog);
  gl.bindBuffer(gl.ARRAY_BUFFER,o.buf);
  gl.enableVertexAttribArray(sel.ap); gl.vertexAttribPointer(sel.ap,2,gl.FLOAT,false,0,0);
  gl.viewport(0,0,DIM,DIM);
  gl.clearColor(0,0,0,0); gl.clear(gl.COLOR_BUFFER_BIT);
  const c=PALETTE[l.colorIdx];
  gl.uniform2f(sel.u.u_res,DIM,DIM);
  gl.uniform1f(sel.u.u_xMin,cx-hw); gl.uniform1f(sel.u.u_xMax,cx+hw);
  gl.uniform1f(sel.u.u_yMin,cy-hh); gl.uniform1f(sel.u.u_yMax,cy+hh);
  gl.uniform1i(sel.u.u_maxIter,l.maxIter);
  gl.uniform1f(sel.u.u_n,l.n);
  gl.uniform1f(sel.u.u_rot,l.rot);
  if(sel.u.u_bands) gl.uniform1f(sel.u.u_bands,l.bands);
  gl.uniform1f(sel.u.u_outline,l.outline);
  gl.uniform1f(sel.u.u_radius,l.radius);
  gl.uniform1f(sel.u.u_size,l.size);
  if(sel.u.u_shape) gl.uniform1i(sel.u.u_shape,l.shape);
  gl.uniform2fv(sel.u.u_roots,buildRoots(l.n,l.radius));
  gl.uniform3fv(sel.u.u_int,c.intV);
  gl.uniform3fv(sel.u.u_lt,c.ltV);
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
  gl.finish();
}

function composite(){
  const {gl,u,textures}=comp;
  gl.viewport(0,0,DIM,DIM);
  const scales=new Float32Array(MAX_LAYERS);
  const opac=new Float32Array(MAX_LAYERS);
  const blend=new Int32Array(MAX_LAYERS);
  for(let i=0;i<MAX_LAYERS;i++){
    gl.activeTexture(gl.TEXTURE0+i);
    gl.bindTexture(gl.TEXTURE_2D,textures[i]);
    if(i<numLayers){
      gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,gl.RGBA,gl.UNSIGNED_BYTE,offscreens[i].cv);
      scales[i]=getScale(i,numLayers);
      opac[i]=layers[i].opacity;
      blend[i]=layers[i].blend;
    } else {
      gl.texImage2D(gl.TEXTURE_2D,0,gl.RGBA,1,1,0,gl.RGBA,gl.UNSIGNED_BYTE,new Uint8Array([0,0,0,0]));
      scales[i]=1.0; opac[i]=0; blend[i]=0;
    }
    gl.uniform1i(u.tex[i],i);
  }
  gl.uniform1fv(u.scales,scales);
  gl.uniform1fv(u.opacity,opac);
  gl.uniform1iv(u.blend,blend);
  gl.uniform1i(u.numLayers,numLayers);
  gl.uniform3fv(u.bg,hx(GROUNDS[bgIdx].hex));
  gl.drawArrays(gl.TRIANGLE_STRIP,0,4);
}

function renderNow(){
  if(!webglOK) return;
  for(let i=0;i<numLayers;i++) renderOffscreen(i);
  composite();
  const st=document.getElementById('status');
  if(st) st.textContent = Array.from({length:numLayers},(_,i)=>{
    const l=layers[i];
    return mode==='shapes' ? `L${i+1}: ${SHAPE_NAMES[l.shape].split(' ')[0]} ×${l.n}` : `L${i+1}: n=${l.n} · r=${l.radius.toFixed(2)}`;
  }).join('   ');
}

let rafId=null;
function renderAll(){
  if(!webglOK) return;
  if(rafId) cancelAnimationFrame(rafId);
  rafId=requestAnimationFrame(renderNow);
}

// ===================== UI =====================
function buildGrounds(){
  const row=document.getElementById('bgRow'); row.innerHTML='';
  GROUNDS.forEach((g,gi)=>{
    const el=document.createElement('div');
    el.className='bg-sw'+(gi===bgIdx?' selected':'');
    el.style.background=g.hex; el.title=g.name;
    el.addEventListener('click',()=>{ bgIdx=gi; buildGrounds(); renderAll(); });
    row.appendChild(el);
  });
}

function buildPanels(){
  const container=document.getElementById('panels'); container.innerHTML='';
  for(let i=0;i<numLayers;i++){
    const l=layers[i];
    const isShape = mode==='shapes';
    const pos = numLayers===1 ? 'only' : i===0 ? 'base' : i===numLayers-1 ? 'top' : 'middle';
    const sc=getScale(i,numLayers).toFixed(2);
    const panel=document.createElement('div'); panel.className='panel';

    const swatches=PALETTE.map((p,ci)=>
      `<div class="swatch${l.colorIdx===ci?' selected':''}" style="background:${p.fill}" data-ci="${ci}" title="${p.name}"></div>`
    ).join('');

    panel.innerHTML=`
      <div class="panel-header">
        <div class="layer-dot" id="dot${i}" style="background:${PALETTE[l.colorIdx].fill}"></div>
        <div class="panel-title">Layer ${i+1}</div>
        <div class="panel-sub">${pos} · size ${sc}</div>
      </div>
      <div class="ctrls">
        <div class="pcg" title="${isShape?'how many motifs around the ring':'symmetry / petal count'}">${isShape?'count':'n'} <input type="range" min="2" max="${MAX_N}" value="${l.n}" step="1" data-k="n"> <b data-out="n">${l.n}</b></div>
        ${isShape
          ? `<div class="pcg" title="which motif">shape <select class="mini" data-k="shape">${SHAPE_NAMES.map((s,si)=>`<option value="${si}"${l.shape===si?' selected':''}>${s}</option>`).join('')}</select></div>
        <div class="pcg" title="motif size">size <input type="range" min="0.04" max="0.9" value="${l.size}" step="0.01" data-k="size"> <b data-out="size">${l.size.toFixed(2)}</b></div>`
          : `<div class="pcg" title="detail (iterations)">iter <input type="range" min="20" max="400" value="${l.maxIter}" step="10" data-k="maxIter"> <b data-out="maxIter">${l.maxIter}</b></div>`}
        <div class="pcg" title="${isShape?'ring radius — distance from center':'root radius — petal spread'}">radius <input type="range" min="${isShape?'0.0':'0.6'}" max="${isShape?'1.6':'2.0'}" value="${l.radius}" step="0.01" data-k="radius"> <b data-out="radius">${l.radius.toFixed(2)}</b></div>
        <div class="pcg" title="rotation">rot <input type="range" min="0" max="6.28" value="${l.rot}" step="0.01" data-k="rot"> <b data-out="rot">${l.rot.toFixed(2)}</b></div>
        <div class="pcg" title="${isShape?'concentric inner outlines':'color bands (0 = smooth)'}">bands <input type="range" min="0" max="10" value="${l.bands}" step="1" data-k="bands"> <b data-out="bands">${l.bands||'—'}</b></div>
        <div class="pcg" title="opacity">opacity <input type="range" min="0" max="1" value="${l.opacity}" step="0.05" data-k="opacity"> <b data-out="opacity">${l.opacity.toFixed(2)}</b></div>
        <div class="pcg">blend <select class="mini" data-k="blend">${BLEND_NAMES.map((b,bi)=>`<option value="${bi}"${l.blend===bi?' selected':''}>${b}</option>`).join('')}</select></div>
        <div class="pcg">outline <select class="mini" data-k="outline">${OUTLINE_NAMES.map((o,oi)=>`<option value="${oi}"${l.outline===oi?' selected':''}>${o}</option>`).join('')}</select></div>
      </div>
      <div class="swatches">${swatches}</div>`;
    container.appendChild(panel);

    // range / select handlers
    panel.querySelectorAll('input[type=range], select.mini').forEach(ctrl=>{
      ctrl.addEventListener('input',e=>{
        const k=e.target.dataset.k;
        let val = e.target.type==='range' ? parseFloat(e.target.value) : parseInt(e.target.value,10);
        if(['n','maxIter','bands','blend','outline','shape'].includes(k)) val=Math.round(val);
        layers[i][k]=val;
        const out=panel.querySelector(`[data-out="${k}"]`);
        if(out) out.textContent = (k==='radius'||k==='rot'||k==='opacity'||k==='size') ? val.toFixed(2) : (k==='bands'&&val===0?'—':val);
        renderAll();
      });
    });
    // color swatches
    panel.querySelectorAll('.swatch').forEach(sw=>{
      sw.addEventListener('click',()=>{
        const ci=parseInt(sw.dataset.ci,10);
        layers[i].colorIdx=ci;
        document.getElementById(`dot${i}`).style.background=PALETTE[ci].fill;
        panel.querySelectorAll('.swatch').forEach(s=>s.classList.remove('selected'));
        sw.classList.add('selected');
        renderAll();
      });
    });
  }
}

    {n:20,maxIter:120,radius:1.00,rot:0,colorIdx:3,opacity:1,blend:0,bands:0,outline:1},
    {n:10,maxIter:100,radius:1.02,rot:0.16,colorIdx:0,opacity:1,blend:0,bands:7,outline:1},
    {n:10,maxIter:90, radius:1.04,rot:0,colorIdx:1,opacity:1,blend:0,bands:0,outline:1},
    {n:5, maxIter:70, radius:1.08,rot:0.31,colorIdx:2,opacity:1,blend:0,bands:0,outline:1},
    {n:5, maxIter:55, radius:1.12,rot:0,colorIdx:6,opacity:0.9,blend:0,bands:0,outline:2},
  ]},
  '필리그리 Newton filigree': { numLayers:3, mode:'newton', bgIdx:1, layers:[
    {n:12,maxIter:60,radius:1.00,rot:0,colorIdx:3,opacity:1,blend:0,bands:0,outline:1},
    {n:8, maxIter:50,radius:1.00,rot:0.20,colorIdx:1,opacity:1,blend:0,bands:0,outline:1},
    {n:6, maxIter:40,radius:1.00,rot:0,colorIdx:2,opacity:1,blend:0,bands:0,outline:1},
  ]},
};

function applyConfig(cfg){
  numLayers=Math.max(1,Math.min(MAX_LAYERS,cfg.numLayers|0));
  mode = cfg.mode==='newton' ? 'newton' : 'escape';
  bgIdx = Math.max(0,Math.min(GROUNDS.length-1, cfg.bgIdx|0));
  const base=defaultLayers();
  layers = base.map((d,i)=>{
    const s = cfg.layers && cfg.layers[i] ? cfg.layers[i] : null;
    if(!s) return d;
    return {
      n: clampI(s.n,2,MAX_N,d.n),
      maxIter: clampI(s.maxIter,20,400,d.maxIter),
      radius: clampF(s.radius,0.6,2.0,d.radius),
      rot: clampF(s.rot,0,6.2832,d.rot),
      colorIdx: clampI(s.colorIdx,0,PALETTE.length-1,d.colorIdx),
      opacity: clampF(s.opacity,0,1,1),
      blend: clampI(s.blend,0,2,0),
      bands: clampI(s.bands,0,10,0),
      outline: clampI(s.outline,0,2,1),
      shape: clampI(s.shape,0,SHAPE_NAMES.length-1,d.shape),
      size: clampF(s.size,0.04,1.5,d.size),
    };
  });
  syncTopControls();
  buildGrounds(); buildPanels(); renderAll();
}
function clampI(v,lo,hi,dflt){ v=parseInt(v,10); return isNaN(v)?dflt:Math.max(lo,Math.min(hi,v)); }
function clampF(v,lo,hi,dflt){ v=parseFloat(v); return isNaN(v)?dflt:Math.max(lo,Math.min(hi,v)); }

function syncTopControls(){
  document.getElementById('numLayers').value=numLayers;
  document.getElementById('numLayersOut').textContent=numLayers;
  document.getElementById('modeSel').value=mode;
}

function currentConfig(){
  return { version:1, numLayers, mode, bgIdx, layers: layers.slice(0,numLayers).map(l=>({...l})) };
}

// ---- top controls ----
document.getElementById('numLayers').addEventListener('input',e=>{
  numLayers=parseInt(e.target.value,10);
  document.getElementById('numLayersOut').textContent=numLayers;
  buildPanels(); renderAll();
});
document.getElementById('modeSel').addEventListener('change',e=>{ mode=e.target.value; buildPanels(); renderAll(); });
document.getElementById('btnReset').addEventListener('click',()=>{ layers=defaultLayers(); numLayers=4; mode='shapes'; bgIdx=1; syncTopControls(); buildGrounds(); buildPanels(); renderAll(); });
document.getElementById('btnRandom').addEventListener('click',()=>{
  const syms=[3,4,5,6,8,10,12,16,24];
  for(let i=0;i<numLayers;i++){
    const l=layers[i];
    l.n=syms[Math.floor(Math.random()*syms.length)];
    l.rot=+(Math.random()*Math.PI/l.n*2).toFixed(2);
    l.colorIdx=Math.floor(Math.random()*PALETTE.length);
    l.bands=Math.random()<0.4?Math.floor(2+Math.random()*7):0;
    l.outline=Math.random()<0.85?1:2;
    if(mode==='shapes'){
      l.shape=Math.floor(Math.random()*SHAPE_NAMES.length);
      l.radius=+(0.1+Math.random()*1.2).toFixed(2);
      l.size=+(0.1+Math.random()*0.5).toFixed(2);
    } else {
      l.radius=+(0.95+Math.random()*0.4).toFixed(2);
    }
  }
  buildPanels(); renderAll();
});

// presets dropdown
(function(){
  const sel=document.getElementById('presetSel');
  Object.keys(PRESETS).forEach(name=>{ const o=document.createElement('option'); o.value=name; o.textContent=name; sel.appendChild(o); });
  sel.addEventListener('change',e=>{ const p=PRESETS[e.target.value]; if(p){ applyConfig(JSON.parse(JSON.stringify(p))); } });
})();

// ---- export PNG (re-render at higher resolution) ----
function setDim(d){
  DIM=d;
  for(const o of offscreens){ o.cv.width=d; o.cv.height=d; }
  document.getElementById('cComp').width=d;
  document.getElementById('cComp').height=d;
}
document.getElementById('btnPng').addEventListener('click',()=>{
  if(!webglOK) return;
  const scale=parseInt(document.getElementById('exportSel').value,10)||1;
  setDim(BASE_DIM*scale);
  renderNow();
  const url=document.getElementById('cComp').toDataURL('image/png');
  setDim(BASE_DIM); renderNow();
  const a=document.createElement('a'); a.href=url; a.download='dancheong.png'; a.click();
});

// ---- save / load config ----
document.getElementById('btnSave').addEventListener('click',()=>{
  const blob=new Blob([JSON.stringify(currentConfig(),null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download='dancheong-config.json'; a.click();
  setTimeout(()=>URL.revokeObjectURL(a.href),2000);
});
document.getElementById('btnLoad').addEventListener('click',()=>document.getElementById('fileLoad').click());
document.getElementById('fileLoad').addEventListener('change',e=>{
  const f=e.target.files&&e.target.files[0]; if(!f) return;
  const r=new FileReader();
  r.onload=()=>{ try{ applyConfig(JSON.parse(r.result)); }catch(err){ const st=document.getElementById('status'); if(st) st.textContent="Couldn't read that config file — make sure it's a JSON saved from here."; } };
  r.readAsText(f); e.target.value='';
});

// ===================== init =====================
function init(){
  const compCanvas=document.getElementById('cComp');
  for(let i=0;i<MAX_LAYERS;i++){ const o=makeOffscreen(); if(o) offscreens.push(o); }
  comp=makeComp(compCanvas);
  if(!webglOK || offscreens.length<MAX_LAYERS || !comp){
    const m=document.getElementById('glmsg');
    m.style.display='flex';
    m.textContent='This view needs WebGL, which your browser or device has turned off. Enable hardware acceleration / WebGL and reload to see the pattern.';
    return;
  }
  // context-loss resilience
  compCanvas.addEventListener('webglcontextlost',ev=>{ ev.preventDefault(); }, false);
  compCanvas.addEventListener('webglcontextrestored',()=>{ comp=makeComp(compCanvas); renderAll(); }, false);

  buildGrounds(); buildPanels(); renderAll();
}
init();

})();
